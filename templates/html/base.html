<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 1920px;
        height: 1080px;
        background: #1a1a2e;
        font-family: 'Helvetica Neue', 'Inter', sans-serif;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }
    .container {
        width: 1600px;
        height: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
    }
    h1 {
        font-size: 64px;
        font-weight: 700;
        opacity: 0;
        animation: fadeSlideUp 1.5s ease forwards;
    }
    p {
        font-size: 32px;
        color: #a0a0b8;
        text-align: center;
        max-width: 1200px;
        line-height: 1.6;
        opacity: 0;
        animation: fadeSlideUp 1.5s ease 0.5s forwards;
    }
    .accent { color: #58C4DD; }
    .highlight { color: #FFFF00; }

    @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Base Template</h1>
        <p>This is the base HTML template with the <span class="accent">3Blue1Brown</span> dark theme and animation utilities.</p>
    </div>
</body>
</html>
