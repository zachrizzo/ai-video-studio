<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 1920px;
        height: 1080px;
        background: #1a1a2e;
        font-family: 'Helvetica Neue', 'Inter', sans-serif;
        overflow: hidden;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px;
    }
    .comp-title {
        font-size: 42px;
        font-weight: 700;
        margin-bottom: 60px;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
    }
    .comp-container {
        display: flex;
        gap: 60px;
        width: 1600px;
    }
    .comp-side {
        flex: 1;
        border: 2px solid #333;
        border-radius: 16px;
        padding: 40px;
        opacity: 0;
    }
    .comp-side.left {
        border-color: #58C4DD;
        background: rgba(88, 196, 221, 0.05);
        animation: slideInLeft 0.8s ease 0.5s forwards;
    }
    .comp-side.right {
        border-color: #FC6255;
        background: rgba(252, 98, 85, 0.05);
        animation: slideInRight 0.8s ease 0.8s forwards;
    }
    .comp-side h2 {
        font-size: 32px;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 1px solid #333;
    }
    .comp-side.left h2 { color: #58C4DD; }
    .comp-side.right h2 { color: #FC6255; }
    .comp-item {
        font-size: 22px;
        margin-bottom: 20px;
        padding-left: 20px;
        position: relative;
        color: #d0d0e0;
    }
    .comp-item::before {
        content: '•';
        position: absolute;
        left: 0;
        color: inherit;
    }
    .vs-badge {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a2e;
        border: 2px solid #FFFF00;
        border-radius: 50%;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: #FFFF00;
        opacity: 0;
        animation: popIn 0.5s ease 1.2s forwards;
        z-index: 10;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-60px); }
        to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(60px); }
        to { opacity: 1; transform: translateX(0); }
    }
    @keyframes popIn {
        from { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
</style>
</head>
<body>
    <div class="comp-title">Method A vs Method B</div>
    <div style="position: relative; width: 1600px;">
        <div class="comp-container">
            <div class="comp-side left">
                <h2>Method A</h2>
                <div class="comp-item">Feature one</div>
                <div class="comp-item">Feature two</div>
                <div class="comp-item">Feature three</div>
            </div>
            <div class="comp-side right">
                <h2>Method B</h2>
                <div class="comp-item">Feature one</div>
                <div class="comp-item">Feature two</div>
                <div class="comp-item">Feature three</div>
            </div>
        </div>
        <div class="vs-badge">VS</div>
    </div>
</body>
</html>
